<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>game</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 40px;
            background: #111;
            color: #eee;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 20px;
        }

        #count {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0f0;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 28px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .note {
            color: #f90;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1></h1>
    <div> <span id="count">0</span> </div>
    <button id="start">▶ 开始</button>
    <button id="stop" disabled></button>
    <p class="note"></p>

    <script>
        const $ = id => document.getElementById(id);
        const RUN_KEY = 'infinite_running';
        const COUNT_KEY = 'infinite_count';
        const SPAWN_INTERVAL = 200; // 裂变间隔 (ms)

        let timer = null;

        function updateCount() {
            $('count').textContent = localStorage.getItem(COUNT_KEY) || '0';
        }

        function changeCount(delta) {
            let v = parseInt(localStorage.getItem(COUNT_KEY) || '0') + delta;
            if (v < 0) v = 0;
            localStorage.setItem(COUNT_KEY, v);
            updateCount();
        }

        function openPage() {
            const w = window.open(location.href, '_blank');
            if (w) {
                changeCount(1);
                const check = setInterval(() => {
                    if (w.closed) { clearInterval(check); changeCount(-1); }
                }, 800);
            }
        }

        // 用 setTimeout 递归保证间隔准确，不受卡顿影响
        function spawnLoop() {
            if (localStorage.getItem(RUN_KEY) !== '1') return;
            openPage();
            timer = setTimeout(spawnLoop, SPAWN_INTERVAL);
        }

        function start() {
            if (timer) return;
            localStorage.setItem(RUN_KEY, '1');
            openPage();                 // 立刻打开一个
            timer = setTimeout(spawnLoop, SPAWN_INTERVAL); // 延迟后开始循环
            $('start').disabled = true;
            $('stop').disabled = false;
        }

        function stop() {
            if (timer) { clearTimeout(timer); timer = null; }
            localStorage.setItem(RUN_KEY, '0');
            $('start').disabled = false;
            $('stop').disabled = true;
        }

        window.addEventListener('load', () => {
            updateCount();

            // 若是被其他窗口打开的，且全局开关已开，立即跟随裂变
            if (localStorage.getItem(RUN_KEY) === '1' && window.opener !== null) {
                start();
            }

            window.addEventListener('storage', e => {
                if (e.key === RUN_KEY) {
                    e.newValue === '1' ? start() : stop();
                } else if (e.key === COUNT_KEY) {
                    updateCount();
                }
            });

            window.addEventListener('beforeunload', () => {
                changeCount(-1);
                if (timer) { clearTimeout(timer); timer = null; }
                if (parseInt(localStorage.getItem(COUNT_KEY) || '0') <= 0) {
                    localStorage.removeItem(RUN_KEY);
                    localStorage.removeItem(COUNT_KEY);
                }
            });
        });

        $('start').onclick = start;
        $('stop').onclick = stop;
    </script>
</body>

</html>
