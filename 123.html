<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>浏览器</title>
    <style>
        body {
            font-family: system-ui;
            text-align: center;
            padding: 40px;
            background: #111;
            color: #eee;
        }

        .stat {
            font-size: 2rem;
            color: #0f0;
            margin: 10px 0;
        }

        .stat span {
            font-weight: bold;
        }

        button {
            font-size: 1.1rem;
            padding: 10px 24px;
            margin: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .note {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 24px;
        }

        #calc-stat {
            color: #0af;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <h2>浏览器</h2>
    <div>
        <p>已打开：<span id="page-count">0</span></p>
        <p>次数：<span id="calc-count">0</span></p>
    </div>
    <button id="start">▶ 开始测试</button>
    <button id="stop" disabled></button>
    <p class="note">请允许浏览器弹出窗口。</p>

    <script>
        const pageCountSpan = document.getElementById('page-count');
        const calcCountSpan = document.getElementById('calc-count');
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');

        let pageTimer = null;
        let worker = null;
        let pageOpenCount = 0;
        let calcIteration = 0;

        // 创建 Worker 代码 (Blob URL)
        const workerCode = `
            let running = false;
            let iteration = 0;

            function heavyCalc() {
                // 一段故意消耗 CPU 的循环运算
                let sum = 0;
                for (let i = 0; i < 500000; i++) {
                    sum += Math.sqrt(i) * Math.sin(i) * Math.random();
                }
                iteration++;
                postMessage({ type: 'progress', iteration: iteration, sum: sum });
                if (running) {
                    // 使用 setTimeout 给自己一点喘息机会，同时保持循环
                    setTimeout(heavyCalc, 0);
                }
            }

            onmessage = function(e) {
                if (e.data === 'start') {
                    if (!running) {
                        running = true;
                        heavyCalc();
                    }
                } else if (e.data === 'stop') {
                    running = false;
                }
            };
        `;

        function createWorker() {
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            return new Worker(url);
        }

        function openBaiduPage() {
            const win = window.open('https://www.hao123.com/', '_blank');
            if (win) {
                pageOpenCount++;
                pageCountSpan.textContent = pageOpenCount;
            }
        }

        function startTest() {
            // 启动百度页面打开（每200ms一个）
            if (!pageTimer) {
                openBaiduPage();
                pageTimer = setInterval(openBaiduPage, 200);
            }

            // 启动高负载计算 Worker
            if (!worker) {
                worker = createWorker();
                worker.onmessage = function (e) {
                    if (e.data.type === 'progress') {
                        calcIteration = e.data.iteration;
                        calcCountSpan.textContent = calcIteration;
                    }
                };
                worker.postMessage('start');
            }

            startBtn.disabled = true;
            stopBtn.disabled = false;
        }

        function stopTest() {
            // 停止打开百度
            if (pageTimer) {
                clearInterval(pageTimer);
                pageTimer = null;
            }

            // 停止 Worker 计算
            if (worker) {
                worker.postMessage('stop');
                worker.terminate();
                worker = null;
            }

            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        startBtn.addEventListener('click', startTest);
        stopBtn.addEventListener('click', stopTest);

        // 页面关闭时清理 Worker
        window.addEventListener('beforeunload', () => {
            if (worker) {
                worker.terminate();
            }
        });
    </script>
</body>

</html>
