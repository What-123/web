<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>自动无限·百度树</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: system-ui;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 30px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        iframe {
            width: 95%;
            height: 70vh;
            border: 1px solid #333;
            margin-top: 20px;
            background: #fff;
        }

        .info {
            color: #aaa;
            margin: 12px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1>🌳</h1>
    <p class="info" id="status"></p>
    <button id="start">▶ 开始</button>
    <button id="stop" disabled>⏹</button>
    <iframe src="https://www.hao123.com/" allow="popups"></iframe>
    <p class="info">⚠️ 若百度不显示，是因为禁止嵌入，不影响页面打开功能。</p>

    <script>
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const statusEl = document.getElementById('status');

        let stopFlag = false;
        let openedCount = 0;
        const MAX_DEPTH = 100;        // 树深度，3层即 1+3+9+27 = 40个（含自己）
        const CHILDREN_PER = 3;    // 每节点子节点数

        // 生成一个子页面的独立HTML（内嵌百度）
        function getChildPageHTML() {
            return `<!DOCTYPE html>
            <html lang="zh"><head><meta charset="UTF-8"><title>百度子页</title>
            <style>body{background:#111;color:#eee;text-align:center;padding:20px;margin:0;font-family:system-ui;}
            iframe{width:95%;height:80vh;border:1px solid #333;background:#fff;}
            .info{color:#aaa;margin:10px;}</style></head>
            <body><h3>📄 子页面（已自动打开）</h3>
            <iframe src="https://www.baidu.com"></iframe>
            <p class="info">树状自动打开的子页面，无按钮、无需操作。</p></body></html>`;
        }

        // 在当前手势下递归打开树状窗口
        function openTree(depth) {
            if (stopFlag || depth > MAX_DEPTH) return;
            // 为当前节点打开 children 个子窗口
            for (let i = 0; i < CHILDREN_PER; i++) {
                if (stopFlag) break;
                const blob = new Blob([getChildPageHTML()], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const win = window.open(url, '_blank');
                if (win) openedCount++;
                // 递归打开下一层（在同一手势上下文中连续执行）
                if (depth < MAX_DEPTH) {
                    openTree(depth + 1);
                }
            }
            statusEl.textContent = `已打开 ${openedCount} 个页面...`;
        }

        startBtn.addEventListener('click', () => {
            stopFlag = false;
            openedCount = 0;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusEl.textContent = '正在自动生成页面树...';

            // 在同一次用户手势内立即执行，避免拦截
            setTimeout(() => {
                openTree(1);  // 从第1层开始（第0层是当前页面）
                statusEl.textContent = `✅ 完成！共打开 ${openedCount} 个页面（含自身共${openedCount + 1}个）`;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }, 10);
        });

        stopBtn.addEventListener('click', () => {
            stopFlag = true;
            statusEl.textContent = `⏹ 已停止。已打开 ${openedCount} 个页面。`;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        });
    </script>
</body>

</html>
