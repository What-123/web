<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>打开</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: system-ui;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 30px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        p {
            color: #aaa;
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <h1>新标签页</h1>
    <button id="start">▶ 开始</button>
    <button id="stop" disabled></button>
    <p style="font-size:0.85rem;">请在弹窗拦截提示中选择“始终允许”</p>

    <script>
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        let timer = null;
        let count = 0;
        const TOTAL = 200; // 可修改要打开的总数

        function openOne() {
            if (count >= TOTAL) {
                clearInterval(timer);
                timer = null;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                return;
            }
            window.open('https://www.baidu.com', '_blank');
            count++;
        }

        startBtn.onclick = () => {
            if (timer) return;
            count = 0;
            // 在同一个用户手势里启动高速定时器，持续打开页面
            openOne();                     // 立刻打开一个
            timer = setInterval(openOne, 50); // 每50毫秒打开一个（极快）
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        stopBtn.onclick = () => {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };
    </script>
</body>

</html>
