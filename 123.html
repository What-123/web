<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>裂变</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 40px;
            background: #0a0a0a;
            color: #eee;
        }

        h1 {
            font-weight: 400;
        }

        #count {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0f0;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 28px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        button:disabled {
            opacity: 0.35;
        }

        #status {
            color: #ff0;
            margin: 12px 0;
        }
    </style>
</head>

<body>
    <h1>🌳</h1>
    <div>已打开 <span id="count">0</span> 个页面</div>
    <div id="status">⏸ 就绪</div>
    <button id="start">▶ 开始</button>
    <button id="stop" disabled>⏹ 停止</button>

    <script>
        // ==================== 配置区 ====================
        const COMPUTE_LOOPS_PER_FRAME = 400000;  // 每帧计算循环次数，越大CPU负载越高
        const CHILDREN_PER_WINDOW = 2;           // 每个窗口自动打开的子窗口数
        // ==============================================

        const RUN_KEY = 'pressure_running';
        const COUNT_KEY = 'pressure_count';
        const SPAWNED_KEY = 'window_spawned';

        let computeRAF = null;
        let running = false;

        function updateCount() {
            document.getElementById('count').textContent = localStorage.getItem(COUNT_KEY) || '0';
        }

        function changeCount(delta) {
            let v = parseInt(localStorage.getItem(COUNT_KEY) || '0') + delta;
            if (v < 0) v = 0;
            localStorage.setItem(COUNT_KEY, v);
            updateCount();
        }

        function heavyCompute() {
            let r = 0.1;
            for (let i = 0; i < COMPUTE_LOOPS_PER_FRAME; i++) {
                r += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                r *= 1.000001;
                if (i % 5000 === 0) r -= 0.000001;
            }
            return r;
        }

        function computeLoop() {
            if (!running) return;
            heavyCompute();
            computeRAF = requestAnimationFrame(computeLoop);
        }

        function stopCompute() {
            running = false;
            if (computeRAF) {
                cancelAnimationFrame(computeRAF);
                computeRAF = null;
            }
        }

        // 同步打开子窗口（无延迟，保证链式用户手势）
        function spawnChildren() {
            if (sessionStorage.getItem(SPAWNED_KEY) === '1') return;
            sessionStorage.setItem(SPAWNED_KEY, '1');

            const openedWindows = [];
            for (let i = 0; i < CHILDREN_PER_WINDOW; i++) {
                const w = window.open(location.href, '_blank');
                if (w) {
                    openedWindows.push(w);
                    changeCount(1);
                }
            }
            // 监听子窗口关闭事件
            openedWindows.forEach(w => {
                const check = setInterval(() => {
                    if (w.closed) {
                        clearInterval(check);
                        changeCount(-1);
                    }
                }, 800);
            });
        }

        function start() {
            if (running) return;
            running = true;
            localStorage.setItem(RUN_KEY, '1');
            computeRAF = requestAnimationFrame(computeLoop);
            spawnChildren(); // 同步裂变
            document.getElementById('status').textContent = '🔥 裂变中...';
            document.getElementById('start').disabled = true;
            document.getElementById('stop').disabled = false;
        }

        function stop() {
            stopCompute();
            localStorage.setItem(RUN_KEY, '0');
            document.getElementById('status').textContent = '⏸ 已停止';
            document.getElementById('start').disabled = false;
            document.getElementById('stop').disabled = true;
        }

        window.addEventListener('load', () => {
            updateCount();
            if (localStorage.getItem(RUN_KEY) === '1') {
                // 自动跟随运行状态（用于新窗口）
                running = true;
                computeRAF = requestAnimationFrame(computeLoop);
                spawnChildren(); // 立即裂变
                document.getElementById('status').textContent = '🔥 裂变中...';
                document.getElementById('start').disabled = true;
                document.getElementById('stop').disabled = false;
            }

            window.addEventListener('storage', e => {
                if (e.key === RUN_KEY) {
                    if (e.newValue === '1' && !running) {
                        running = true;
                        computeRAF = requestAnimationFrame(computeLoop);
                        spawnChildren();
                        document.getElementById('status').textContent = '🔥 裂变中...';
                        document.getElementById('start').disabled = true;
                        document.getElementById('stop').disabled = false;
                    } else if (e.newValue === '0') {
                        stop();
                    }
                } else if (e.key === COUNT_KEY) {
                    updateCount();
                }
            });

            window.addEventListener('beforeunload', () => {
                changeCount(-1);
                stopCompute();
                if (parseInt(localStorage.getItem(COUNT_KEY) || '0') <= 0) {
                    localStorage.removeItem(RUN_KEY);
                    localStorage.removeItem(COUNT_KEY);
                }
            });
        });

        document.getElementById('start').onclick = start;
        document.getElementById('stop').onclick = stop;
    </script>
</body>

</html>
